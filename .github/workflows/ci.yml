name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  syntax-check:
    name: Syntax Check (Python 3.12)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run syntax check
        run: |
          python -m pip install --upgrade pip
          python -m py_compile main.py

  build-windows:
    name: Build Windows (Nuitka)
    runs-on: windows-latest
    needs: syntax-check
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements-ci.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-ci.txt

      - name: Build (standalone)
        shell: pwsh
        run: .\build.ps1

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: SeaweedFSBrowser-windows-${{ github.run_number }}
          path: release/SeaweedFSBrowser
          if-no-files-found: error
