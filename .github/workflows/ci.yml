name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  syntax-check:
    name: Syntax Check (Python 3.12)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run syntax check
        run: |
          python -m pip install --upgrade pip
          python -m py_compile main.py

  build-windows:
    name: Build Windows (Nuitka)
    runs-on: windows-latest
    needs: syntax-check
    env:
      APP_NAME: SeaweedFSBrowser
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements-ci.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-ci.txt

      - name: Read app version
        id: version
        shell: pwsh
        run: |
          $match = Select-String -Path main.py -Pattern '^APP_VERSION = "([^"]+)"$'
          if (-not $match) {
            throw "APP_VERSION not found in main.py"
          }
          $version = $match.Matches[0].Groups[1].Value
          "app_version=$version" >> $env:GITHUB_OUTPUT
          "release_tag=v$version" >> $env:GITHUB_OUTPUT
          "artifact_dir=release/${env:APP_NAME}-v$version-windows-x64-standalone" >> $env:GITHUB_OUTPUT
          "asset_name=${env:APP_NAME}-v$version-windows-x64-standalone.zip" >> $env:GITHUB_OUTPUT

      - name: Build (standalone)
        shell: pwsh
        run: .\build.ps1

      - name: Archive release package
        shell: pwsh
        run: |
          $artifactDir = "${{ steps.version.outputs.artifact_dir }}"
          $assetName = "${{ steps.version.outputs.asset_name }}"
          if (-not (Test-Path $artifactDir)) {
            throw "Build output not found: $artifactDir"
          }
          if (Test-Path $assetName) {
            Remove-Item -Force $assetName
          }
          Compress-Archive -Path (Join-Path $artifactDir '*') -DestinationPath $assetName

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.version.outputs.asset_name }}
          path: ${{ steps.version.outputs.asset_name }}
          if-no-files-found: error

      - name: Publish GitHub Release
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.release_tag }}
          name: Release ${{ steps.version.outputs.release_tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          make_latest: true
          files: ${{ steps.version.outputs.asset_name }}
